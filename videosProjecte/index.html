<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    
    <div class="containerVideo">
        <div class="backdrop" id="backdropVideo">
            <div class="container-fluid">
                <div class="row">
                    <div class="col d-flex justify-content-center align-items-center" style="height: 150px;">
                        <p id="title"></p>
                    </div>
                </div>
                <div class="row">
                    <div class="col col-6 d-flex align-items-center justify-content-center" style="height: 375px;">
                        <div class="questions d-flex align-items-center justify-content-center" id="buttonYes">
                            <!-- <div class="backdrop" id="backdropQuestion"></div> -->
                            <p class="answers">SI</p>
                        </div> 
                    </div>
                    <div class="col col-6 d-flex align-items-center justify-content-center" style="height: 375px;">
                        <div class="questions d-flex align-items-center justify-content-center" id="buttonNo">
                            <!-- <div class="backdrop" id="backdropQuestion"></div> -->
                            <p class="answers">NO</p>
                        </div> 
                    </div>
                </div>
                <div class="row">
                    <div class="col col-1 d-flex align-items-center justify-content-center" style="height: 75px;">
                        <div id="refreshButton">
                            <i class="fa fa-refresh"></i>
                        </div>
                        
                    </div>
                </div>
            </div>          

        </div>
        <div class="backdrop" id="backdropRefresh">
            <div class="container-fluid">
                <div class="row">
                    <div class="col d-flex align-items-center justify-content-center" style="height: 600px;">
                        <div id="refreshButtonGeneral">
                            <i class="fa fa-refresh fa-7x"></i>
                        </div>
                        
                    </div>
                </div>
            </div>
            
        </div>
        <video data-tiposvideo="1" id="video" width="1066.2" height="600" controls>
            <source id="sourceVideo" src="media/videoInteractivo.mp4#t=0,24" 
            type="video/mp4">
            <!-- <source src="movie.ogg" type="video/ogg"> -->
        </video>        
    </div>

    <script src="https://kit.fontawesome.com/7fae944b38.js" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" 
    integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" 
    integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    <script src="index.js"></script>
</body>
</html>
